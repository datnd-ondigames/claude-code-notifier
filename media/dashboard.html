<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; media-src 'self';" />
  <title>Claude Notifier</title>
  <link rel="stylesheet" href="./dashboard.css" />
  <!-- __BOOTSTRAP__ -->
</head>
<body>
  <header>
    <div class="title">Claude Notifier <span class="port" id="port"></span></div>
    <div class="chips" id="chips"></div>
    <input id="search" placeholder="search…" />
    <button id="mark-all">mark all read</button>
    <button id="clear">clear</button>
    <label><input type="checkbox" id="arrival-sound" /> sound on arrival</label>
  </header>
  <main id="list" aria-live="polite"></main>
  <footer>
    <span id="conn">disconnected</span>
    <span id="count">0 events</span>
  </footer>
  <audio id="pling" preload="auto"></audio>
  <script src="./dashboard.js"></script>
</body>
</html>
